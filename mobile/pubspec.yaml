name: bakery_manager
description: اپلیکیشن مدیریت نانوایی — Offline-First
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.2.7
  drift: ^2.20.3
  sqlite3: ^2.4.4
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  shamsi_date: ^1.1.1
  # نسخه intl توسط flutter_localizations پین می‌شود؛ برای جلوگیری از تداخل نسخه آزاد است.
  intl: any
  flutter_secure_storage: ^9.2.2
  uuid: ^4.5.1
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.20.3
  build_runner: ^2.4.13
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# پیکربندی آیکون اپ. فایل assets/icon/icon.png را طبق ICON_SPLASH_SETUP.md اضافه کنید،
# سپس دستور «flutter pub run flutter_launcher_icons» را اجرا کنید.
# ios غیرفعال است چون در CI فقط پلتفرم اندروید ساخته می‌شود (flutter create --platforms=android)
# و پوشه ios/Runner/Assets.xcassets وجود ندارد.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

# پیکربندی اسپلش‌اسکرین. فایل assets/icon/splash_logo.png را طبق ICON_SPLASH_SETUP.md اضافه کنید،
# سپس دستور «dart run flutter_native_splash:create» را اجرا کنید.
flutter_native_splash:
  color: "#FCEDCE"
  image: assets/icon/splash_logo.png
  android_12:
    image: assets/icon/splash_logo.png
    color: "#FCEDCE"
